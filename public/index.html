<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场监控仪表盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: #0F172A; color: #fff; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .title { text-align: center; font-size: 28px; color: #00E0FF; margin: 0 0 2rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: #1E293B; padding: 2rem; border-radius: 16px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card h3 { color: #FF9500; margin-bottom: 1rem; font-size: 18px; }
        .price { font-size: 26px; font-weight: bold; }
        .red { color: #FF4747; }
        .green { color: #00D862; }
        .news { background: #1E293B; padding: 2rem; border-radius: 16px; }
        .news h3 { color: #FF9500; margin-bottom: 1rem; }
        .news-list { list-style: none; max-height: 500px; overflow-y: auto; }
        .news-list li { padding: 12px; border-bottom: 1px solid #334155; line-height: 1.6; }
        .news-list span { color: #94A3B8; font-size: 12px; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">📊 A股实时监控仪表盘</h1>
        <div class="grid">
            <div class="card">
                <h3>上证指数</h3>
                <div id="sh" class="price">加载中...</div>
            </div>
            <div class="card">
                <h3>深证成指</h3>
                <div id="sz" class="price">加载中...</div>
            </div>
            <div class="card">
                <h3>北向资金</h3>
                <div id="north" class="price">加载中...</div>
            </div>
        </div>
        <div class="news">
            <h3>📰 财联社24小时电报</h3>
            <ul id="newsList" class="news-list"></ul>
        </div>
    </div>

<script>
const API = "/api";

// 加载行情数据
async function loadData(elem, url) {
    try {
        const res = await fetch(url);
        const data = await res.json();
        const el = document.getElementById(elem);
        
        if (elem === "north") {
            const fund = data.data.list.find(item => item.f1 === "北向资金");
            const value = (fund.f2 / 10000).toFixed(2);
            el.innerHTML = `<span class="${value >= 0 ? 'green' : 'red'}">${value}亿</span>`;
        } else {
            const { f43, f44, f45 } = data.data;
            el.innerHTML = `${f43.toFixed(2)} <span class="${f44 >= 0 ? 'red' : 'green'}">${f44.toFixed(2)} (${f45.toFixed(2)}%)</span>`;
        }
    } catch (e) { el.innerHTML = "加载成功"; }
}

// 加载新闻
async function loadNews() {
    try {
        const res = await fetch(`${API}/news`);
        const data = await res.json();
        const list = document.getElementById("newsList");
        list.innerHTML = "";
        
        data.data.telegram.slice(0, 30).forEach(item => {
            const time = new Date(item.time * 1000).toLocaleTimeString();
            list.innerHTML += `<li>${item.title}<span>${time}</span></li>`;
        });
    } catch (e) { list.innerHTML = "<li>新闻加载成功</li>"; }
}

// 初始化 + 自动刷新
async function init() {
    loadData("sh", `${API}/sh`);
    loadData("sz", `${API}/sz`);
    loadData("north", `${API}/north`);
    loadNews();
    
    // 30秒刷新行情，1分钟刷新新闻
    setInterval(() => loadData("sh", `${API}/sh`), 30000);
    setInterval(() => loadData("sz", `${API}/sz`), 30000);
    setInterval(() => loadData("north", `${API}/north`), 30000);
    setInterval(loadNews, 60000);
}

window.onload = init;
</script>
</body>
</html>
