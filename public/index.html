<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股实时监控仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #fff;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #00e5ff;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .index-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .index-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .index-card h2 {
            color: #ff9500;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .index-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .index-change {
            font-size: 22px;
            font-weight: 600;
        }

        .up {
            color: #ff4d4f;
        }

        .down {
            color: #00b578;
        }

        .news-container {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .news-container h2 {
            color: #ff9500;
            font-size: 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-item {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-title {
            font-size: 16px;
            color: #e2e8f0;
            text-decoration: none;
            flex: 1;
            transition: color 0.2s;
        }

        .news-title:hover {
            color: #00e5ff;
        }

        .news-important {
            background-color: rgba(255, 77, 79, 0.15);
            border-left: 4px solid #ff4d4f;
            border-radius: 4px;
        }

        .news-tag {
            background-color: #ff4d4f;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .news-time {
            color: #94a3b8;
            font-size: 14px;
            white-space: nowrap;
        }

        .loading {
            color: #94a3b8;
            font-size: 20px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span>📊</span>
            A股实时监控仪表盘
        </h1>
    </div>

    <div class="index-container">
        <div class="index-card">
            <h2>上证指数</h2>
            <div class="index-value" id="sh-value">加载中...</div>
            <div class="index-change" id="sh-change"></div>
        </div>
        <div class="index-card">
            <h2>深证成指</h2>
            <div class="index-value" id="sz-value">加载中...</div>
            <div class="index-change" id="sz-change"></div>
        </div>
        <div class="index-card">
            <h2>北向资金</h2>
            <div class="index-value" id="north-value">加载中...</div>
            <div class="index-change" id="north-change"></div>
        </div>
    </div>

    <div class="news-container">
        <h2>
            <span>📰</span>
            财联社24小时电报
        </h2>
        <div id="news-list" class="loading">新闻加载中...</div>
    </div>

    <script>
        // 大盘数据加载函数
        async function loadData() {
            try {
                const response = await fetch('/api/index');
                if (!response.ok) {
                    throw new Error('API请求失败');
                }
                const data = await response.json();

                // 渲染上证指数（所有变量都已定义，无el/list错误）
                const shValueEl = document.getElementById('sh-value');
                const shChangeEl = document.getElementById('sh-change');
                shValueEl.textContent = data.sh.value;
                shChangeEl.textContent = `${data.sh.change} (${data.sh.percent})`;
                shChangeEl.className = 'index-change ' + (data.sh.change.startsWith('+') ? 'up' : 'down');

                // 渲染深证成指
                const szValueEl = document.getElementById('sz-value');
                const szChangeEl = document.getElementById('sz-change');
                szValueEl.textContent = data.sz.value;
                szChangeEl.textContent = `${data.sz.change} (${data.sz.percent})`;
                szChangeEl.className = 'index-change ' + (data.sz.change.startsWith('+') ? 'up' : 'down');

                // 渲染北向资金
                const northValueEl = document.getElementById('north-value');
                const northChangeEl = document.getElementById('north-change');
                northValueEl.textContent = `${data.northbound}亿`;
                northChangeEl.textContent = data.northboundChange;
                northChangeEl.className = 'index-change ' + (data.northboundChange.startsWith('+') ? 'up' : 'down');

            } catch (error) {
                console.error('指数数据加载失败:', error);
                // 加载失败也不会让页面空白，显示默认提示
                document.getElementById('sh-value').textContent = '加载失败';
                document.getElementById('sz-value').textContent = '加载失败';
                document.getElementById('north-value').textContent = '加载失败';
            }
        }

        // 新闻数据加载函数
        async function loadNews() {
            const newsListEl = document.getElementById('news-list');
            try {
                const response = await fetch('/api/news');
                if (!response.ok) {
                    throw new Error('新闻API请求失败');
                }
                const newsList = await response.json();

                // 渲染新闻列表
                let html = '';
                for (const news of newsList) {
                    const importantClass = news.important ? 'news-item news-important' : 'news-item';
                    const tagHtml = news.important ? '<span class="news-tag">重要</span>' : '';
                    html += `
                        <div class="${importantClass}">
                            <a href="${news.url}" target="_blank" class="news-title">
                                ${tagHtml}
                                ${news.title}
                            </a>
                            <span class="news-time">${news.time}</span>
                        </div>
                    `;
                }
                newsListEl.innerHTML = html;

            } catch (error) {
                console.error('新闻加载失败:', error);
                newsListEl.innerHTML = '<div class="loading">新闻加载失败</div>';
            }
        }

        // 页面加载完成后执行
        window.onload = function() {
            loadData();
            loadNews();
            // 每30秒自动刷新一次数据
            setInterval(() => {
                loadData();
                loadNews();
            }, 30000);
        };
    </script>
</body>
</html>
